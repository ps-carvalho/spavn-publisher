version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: publisher-postgres
    environment:
      POSTGRES_USER: publisher
      POSTGRES_PASSWORD: publisher
      POSTGRES_DB: publisher_dev
    ports:
      - '5433:5432'
    volumes:
      - publisher_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U publisher -d publisher_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: .
      target: dev
    container_name: publisher-cms
    environment:
      DATABASE_URL: postgresql://publisher:publisher@postgres:5432/publisher_dev
      PUBLISHER_SECRET: dev-secret-change-in-production
      PUBLISHER_RP_ORIGIN: http://localhost:8080
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3000'

  nginx:
    image: nginx:alpine
    container_name: publisher-nginx
    ports:
      - '8080:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cms

volumes:
  publisher_pgdata:
